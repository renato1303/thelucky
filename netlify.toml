[build]
  command = "pnpm --filter @workspace/mobile exec expo export --platform web"
  publish = "artifacts/mobile/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html (Expo Router handles client-side routing)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
